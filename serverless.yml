# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: irenejoy21testapp
# "service" is the name of this project. This will also be added to your AWS resource names.
service: categoryService

provider:
  name: aws
  runtime: nodejs24.x
  environment:
    BUCKET_NAME : category-images-irenejoy21-dev-12-new
    DYNAMODB_TABLE : Categories
  
  # region: us-east-1
  # Uncomment to easily set up a custom domain. Read the docs for more details:
  # https://www.serverless.com/framework/docs/providers/aws/guide/domains
  # domain: api.example.com
resources:
  Resources:
    CategoryBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: category-images-irenejoy21-dev-12-new 
    CategoryTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: Categories
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: fileName
            AttributeType: S #string
        KeySchema:
          - AttributeName: fileName
            KeyType: HASH #partition key

functions:
  hello:
    handler: handler.hello
    events:
      - httpApi:
          path: /
          method: get
