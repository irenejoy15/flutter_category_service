# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: irenejoy21testapp
# "service" is the name of this project. This will also be added to your AWS resource names.
service: categoryService

provider:
  name: aws
  runtime: nodejs24.x
  environment:
    BUCKET_NAME : category-images-irenejoy21-dev-12-new
    DYNAMODB_TABLE : Categories
    SNS_TOPIC_ARN : arn:aws:sns:us-east-1:660880134927:Category-cleanup-topic
  iamRoleStatements:
    - Effect: 'Allow'
      Action:
        - 's3:PutObject'
      Resource: 
        - arn:aws:s3:::category-images-irenejoy21-dev-12-new/*
    - Effect: 'Allow'
      Action:
        - dynamodb:PutItem
        - dynamodb:Scan
        - dynamodb:DeleteItem
        - dynamodb:UpdateItem
      Resource: 
        - arn:aws:dynamodb:us-east-1:660880134927:table/Categories
    - Effect: 'Allow'
      Action:
        - sns:Publish
      Resource: arn:aws:sns:us-east-1:660880134927:Category-cleanup-topic
  # region: us-east-1
  # Uncomment to easily set up a custom domain. Read the docs for more details:
  # https://www.serverless.com/framework/docs/providers/aws/guide/domains
  # domain: api.example.com
resources:
  Resources:
    CategoryBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: category-images-irenejoy21-dev-12-new 
    CategoryTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: Categories
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: fileName
            AttributeType: S #string
        KeySchema:
          - AttributeName: fileName
            KeyType: HASH #partition key
    CategoryCleanupTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: Category-cleanup-topic
    CategoryCleanupSubscription:
      Type: AWS::SNS::Subscription
      Properties:
        TopicArn: arn:aws:sns:us-east-1:660880134927:Category-cleanup-topic
        Protocol: email
        Endpoint: cefriantrinchera21@gmail.com
functions:
  getUploadUrl:
    handler: handlers/getUploadUrl.getUploadUrl
    events:
      - http:
          path: /upload-url
          method: post
  updateCategoryImage:
    handler: handlers/updateCategoryImage.updateCategoryImage
    events:
      - s3:
          bucket: category-images-irenejoy21-dev-12-new
          event: s3:ObjectCreated:Put
          existing: true
  cleanUpCategories:
    handler: handlers/cleanUpCategories.cleanUpCategories
    events:
      - schedule:
          rate: rate(2 minutes)
      